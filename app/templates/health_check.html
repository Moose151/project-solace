{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><h1 class="mb-1">Health Check</h1><div class="page-kicker">Quick checks for common setup and data issues.</div></div></div>
<div class="card"><div class="card-body">
  <div class="row g-3">
    {% for check in checks %}
    <div class="col-md-6"><div class="soft-panel h-100 health-check health-{{ check.status }}">
      <div class="d-flex align-items-center gap-2 mb-1"><span class="status-dot status-{{ check.status }}"></span><strong>{{ check.title }}</strong></div>
      <div class="text-muted">{{ check.detail }}</div>
    </div></div>
    {% endfor %}
  </div>
</div></div>
{% endblock %}
