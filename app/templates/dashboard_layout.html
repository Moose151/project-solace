{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="mb-1">Dashboard layout</h1>
    <div class="page-kicker">Choose which dashboard sections are shown and in what order.</div>
  </div>
  <div class="action-bar">
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Back to dashboard</a>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="table-responsive">
        <table class="table table-clean align-middle">
          <thead>
            <tr>
              <th>Show</th>
              <th>Widget</th>
              <th>Description</th>
              <th>Order</th>
              <th>Size</th>
            </tr>
          </thead>
          <tbody>
            {% for widget in widgets %}
            <tr>
              <td>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" name="enabled_{{ widget.id }}" id="enabled_{{ widget.id }}" {% if widget.enabled %}checked{% endif %}>
                  <label class="form-check-label visually-hidden" for="enabled_{{ widget.id }}">Show {{ widget.title }}</label>
                </div>
              </td>
              <td class="fw-semibold">{{ widget.title }}</td>
              <td class="text-muted small">{{ widget.description or '' }}</td>
              <td><input class="form-control form-control-sm dashboard-order-input" type="number" name="sort_order_{{ widget.id }}" value="{{ widget.sort_order }}"></td>
              <td>
                <select class="form-select form-select-sm" name="size_{{ widget.id }}">
                  <option value="small" {% if widget.size == 'small' %}selected{% endif %}>Small</option>
                  <option value="medium" {% if widget.size == 'medium' %}selected{% endif %}>Medium</option>
                  <option value="wide" {% if widget.size == 'wide' %}selected{% endif %}>Wide</option>
                </select>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mt-3">
        <button class="btn btn-primary">Save dashboard layout</button>
      </div>
    </form>
    <form method="post" action="{{ url_for('main.reset_dashboard_layout') }}" class="mt-3" onsubmit="return confirm('Reset dashboard widgets to the default layout?')">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button class="btn btn-outline-secondary">Reset default layout</button>
    </form>
  </div>
</div>
{% endblock %}
